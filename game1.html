<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>이쪽저쪽 : 유리수 무리수</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Baloo+2:wght@500;700;800&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  :root{
    --sky-top:#8FD3F0;
    --sky-bottom:#EAF7FF;
    --grass:#8FCB6B;
    --grass-dark:#6EAE4E;
    --path:#F3E3A8;
    --path-dark:#E7CD86;
    --banner:#FFC468;
    --banner-dark:#F0932B;
    --ink:#6B4A2C;
    --ink-soft:#9C8264;
    --irr:#C6A6FF;
    --irr-dark:#9A6BEA;
    --irr-ink:#5B3B9E;
    --rat:#8FEAD1;
    --rat-dark:#45C9A6;
    --rat-ink:#1F7F68;
    --fever:#FFD166;
    --fever2:#FF8F6B;
    --card-bg:#FFFFFF;
    --white:#FFFFFF;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    overflow:hidden; -webkit-tap-highlight-color:transparent; user-select:none;
    font-family:'Gowun Dodum', sans-serif; color:var(--ink);
  }
  body{
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 18% 15%, rgba(143,211,240,0.35), transparent 55%),
      radial-gradient(circle at 85% 12%, rgba(255,196,104,0.30), transparent 50%),
      radial-gradient(circle at 50% 95%, rgba(143,203,107,0.32), transparent 55%),
      linear-gradient(160deg, #2B2F3A 0%, #1B1E27 100%);
  }
  #bgDeco{
    position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
  }
  #bgDeco::after{
    content:'이쪽저쪽'; position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%) rotate(-8deg);
    font-family:'Jua',sans-serif; font-size:min(20vw,220px); color:#fff; opacity:0.05;
    white-space:nowrap; letter-spacing:4px;
  }
  #app{
    position:relative; z-index:1; width:100%; height:100vh; min-height:600px;
    display:flex; flex-direction:column; overflow:hidden;
    background:linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 32%, var(--grass) 33%, var(--grass-dark) 100%);
    transition: filter 0.4s ease;
  }
  #frameChrome{ display:none; }
  #frameTitle{ display:none; }
  /* On roomy desktop/laptop viewports, present the game as a floating window
     card (browser-tab style) instead of stretching edge-to-edge; small/mobile
     screens keep the original full-bleed layout. */
  @media (min-width:700px) and (min-height:640px){
    body{ padding:28px; }
    #app{
      width:auto; max-width:92vw;
      height:min(820px, 90vh);
      aspect-ratio:3/4;
      border-radius:20px;
      padding-top:36px;
      box-shadow:
        0 30px 70px rgba(0,0,0,0.45),
        0 0 0 1px rgba(255,255,255,0.5);
    }
    #app::before{
      content:''; position:absolute; top:0; left:0; right:0; height:36px;
      background:rgba(255,255,255,0.7); backdrop-filter:blur(6px);
      border-radius:20px 20px 0 0; z-index:59;
      box-shadow:inset 0 -1px 0 rgba(107,74,44,0.14);
    }
    #frameChrome{
      display:flex; align-items:center; gap:6px;
      position:absolute; top:13px; left:16px; z-index:61;
    }
    #frameChrome span{ width:10px; height:10px; border-radius:50%; display:block; }
    #frameChrome span:nth-child(1){ background:#FF5F57; }
    #frameChrome span:nth-child(2){ background:#FEBC2E; }
    #frameChrome span:nth-child(3){ background:#28C840; }
    #frameTitle{
      display:block; position:absolute; top:9px; left:50%; transform:translateX(-50%);
      font-family:'Jua',sans-serif; font-size:12.5px; color:var(--ink-soft); z-index:61;
      letter-spacing:0.5px;
    }
  }

  #app.fever{ filter:saturate(1.3) brightness(1.06); }

  /* clouds */
  .cloud{ position:absolute; background:#fff; border-radius:50%; opacity:0.85; filter:blur(0.5px); }
  .cloud::before, .cloud::after{ content:''; position:absolute; background:#fff; border-radius:50%; }
  #c1{ width:70px; height:34px; top:8%; left:8%; }
  #c1::before{ width:40px; height:40px; top:-16px; left:8px; }
  #c1::after{ width:30px; height:30px; top:-10px; left:36px; }
  #c2{ width:90px; height:38px; top:5%; right:6%; }
  #c2::before{ width:44px; height:44px; top:-18px; left:14px; }
  #c2::after{ width:34px; height:34px; top:-10px; left:48px; }

  /* ---------- HUD ---------- */
  #hud{
    position:relative; z-index:5;
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 16px 4px; gap:8px;
  }
  .pill{
    background:var(--white); border-radius:20px; padding:8px 14px;
    box-shadow:0 4px 0 rgba(107,74,44,0.18);
    display:flex; align-items:center; gap:6px;
    font-family:'Jua', sans-serif; font-size:14px; color:var(--ink);
    white-space:nowrap;
  }
  .pill .n{ font-family:'Baloo 2', sans-serif; font-size:19px; font-weight:700; color:var(--banner-dark); }
  .pill.timer .n{ font-size:21px; }
  .pill.timer.low .n{ color:#E5484D; animation:beat 0.6s infinite; }
  @keyframes beat{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }
  .pill.combo .n{ color:var(--irr-dark); transition: color .2s ease, transform .2s ease; }
  .pill.combo .n.hot{ color:var(--fever2); }
  .pill.combo .n.blaze{
    background:linear-gradient(90deg,#FF6B6B,#FFD166,#8FEAD1,#C6A6FF);
    background-size:300% 100%; -webkit-background-clip:text; background-clip:text; color:transparent;
    animation: rainbowShift 1.1s linear infinite;
  }
  @keyframes rainbowShift{ 0%{background-position:0% 50%;} 100%{background-position:300% 50%;} }

  /* ---------- FEVER BANNER ---------- */
  #feverBanner{
    position:absolute; top:16%; left:50%; transform:translate(-50%,-14px);
    font-family:'Jua',sans-serif; font-size:34px; color:var(--banner-dark);
    text-shadow:0 3px 0 #fff, 0 6px 14px rgba(240,147,43,0.5);
    opacity:0; pointer-events:none; z-index:25; white-space:nowrap;
  }
  #feverBanner.show{ animation: feverPop 1.15s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes feverPop{
    0%{ opacity:0; transform:translate(-50%,-30px) scale(0.5) rotate(-6deg);}
    18%{ opacity:1; transform:translate(-50%,4px) scale(1.2) rotate(4deg);}
    32%{ transform:translate(-50%,0) scale(1) rotate(0deg);}
    82%{ opacity:1; }
    100%{ opacity:0; transform:translate(-50%,-6px) scale(1);}
  }
  .confetti{
    position:absolute; width:9px; height:9px; border-radius:3px; top:18%; left:50%;
    pointer-events:none; z-index:24; opacity:0;
  }
  .confetti.go{ animation: confettiFly 0.9s ease-out forwards; }
  @keyframes confettiFly{
    0%{ opacity:1; transform:translate(0,0) rotate(0deg); }
    100%{ opacity:0; transform:translate(var(--dx), var(--dy)) rotate(var(--rot)); }
  }

  /* ---------- JUDGEMENT EFFECTS ---------- */
  #judgeFlash{
    position:absolute; inset:0; z-index:35; pointer-events:none; opacity:0;
    mix-blend-mode:normal;
  }
  #judgeFlash.correct{ background:radial-gradient(ellipse at center, rgba(69,201,166,0.0) 0%, rgba(69,201,166,0.0) 100%); animation: flashCorrect 0.42s ease-out; }
  #judgeFlash.wrong{ background:rgba(229,72,77,0.0); animation: flashWrong 0.42s ease-out; }
  @keyframes flashCorrect{
    0%{ opacity:0; background:radial-gradient(ellipse at center, rgba(69,201,166,0.55) 0%, rgba(69,201,166,0.0) 70%); }
    100%{ opacity:0; }
  }
  @keyframes flashWrong{
    0%{ opacity:1; background:rgba(229,72,77,0.38); }
    100%{ opacity:0; background:rgba(229,72,77,0.0); }
  }
  #app.shake{ animation: shakeApp 0.36s ease; }
  @keyframes shakeApp{
    0%,100%{ transform:translateX(0); }
    15%{ transform:translateX(calc(-1px * var(--shakeMag,6))); }
    30%{ transform:translateX(calc(1px * var(--shakeMag,6))); }
    45%{ transform:translateX(calc(-0.7px * var(--shakeMag,6))); }
    60%{ transform:translateX(calc(0.7px * var(--shakeMag,6))); }
    75%{ transform:translateX(calc(-0.35px * var(--shakeMag,6))); }
    90%{ transform:translateX(calc(0.35px * var(--shakeMag,6))); }
  }

  .judgeMark{
    position:absolute; top:16%; left:50%; transform:translate(-50%,-50%) scale(0.4);
    z-index:36; pointer-events:none; opacity:0; font-family:'Jua',sans-serif;
    font-weight:400; white-space:nowrap;
  }
  .judgeMark.correctGo{ animation: judgePopGood var(--jdur,0.55s) cubic-bezier(.34,1.7,.64,1) forwards; color:var(--rat-ink); text-shadow:0 3px 0 #fff, 0 0 18px rgba(69,201,166,0.7); }
  .judgeMark.wrongGo{ animation: judgePopBad 0.5s cubic-bezier(.34,1.7,.64,1) forwards; color:#E5484D; text-shadow:0 3px 0 #fff, 0 0 14px rgba(229,72,77,0.55); }
  @keyframes judgePopGood{
    0%{ opacity:0; transform:translate(-50%,-40%) scale(0.3) rotate(-8deg); }
    22%{ opacity:1; transform:translate(-50%,-52%) scale(var(--jscale,1.3)) rotate(4deg); }
    45%{ transform:translate(-50%,-50%) scale(calc(var(--jscale,1.3) * 0.92)) rotate(0deg); }
    80%{ opacity:1; }
    100%{ opacity:0; transform:translate(-50%,-70%) scale(calc(var(--jscale,1.3) * 0.85)); }
  }
  @keyframes judgePopBad{
    0%{ opacity:0; transform:translate(-50%,-40%) scale(0.3) rotate(6deg); }
    25%{ opacity:1; transform:translate(-50%,-50%) scale(1.25) rotate(-6deg); }
    50%{ transform:translate(-50%,-50%) scale(1.05) rotate(3deg); }
    100%{ opacity:0; transform:translate(-50%,-46%) scale(0.95) rotate(0deg); }
  }

  .ring{
    position:absolute; top:22%; left:50%; border-radius:50%; pointer-events:none; z-index:8;
    border-style:solid; opacity:0.9; transform:translate(-50%,-50%) scale(0.3);
  }
  .ring.go{ animation: ringPulse var(--rdur,0.55s) ease-out forwards; }
  @keyframes ringPulse{
    0%{ opacity:0.85; transform:translate(-50%,-50%) scale(0.3); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(var(--rscale,2.2)); }
  }

  .sparkle{
    position:absolute; border-radius:50%; top:22%; left:50%; pointer-events:none; z-index:9; opacity:0;
  }
  .sparkle.go{ animation: sparkleFly var(--sdur,0.6s) ease-out forwards; }
  @keyframes sparkleFly{
    0%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
    100%{ opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.3); }
  }

  .laneCard.pulseGood{ animation: cardPulseGood 0.4s ease; }
  .laneCard.pulseBad{ animation: cardPulseBad 0.4s ease; }
  @keyframes cardPulseGood{ 0%{ box-shadow:0 4px 0 rgba(107,74,44,0.22), 0 0 0 8px rgba(69,201,166,0.55);} 100%{ box-shadow:0 4px 0 rgba(107,74,44,0.22), 0 0 0 0 rgba(69,201,166,0);} }
  @keyframes cardPulseBad{ 0%{ box-shadow:0 4px 0 rgba(107,74,44,0.22), 0 0 0 8px rgba(229,72,77,0.55);} 100%{ box-shadow:0 4px 0 rgba(107,74,44,0.22), 0 0 0 0 rgba(229,72,77,0);} }

  /* ---------- STAGE / LANE ---------- */
  #stage{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; position:relative; padding-top:6px; }

  #laneWrap{ position:relative; width:min(220px, 56vw); display:flex; flex-direction:column; align-items:center; }
  #lane{
    width:100%; min-height:340px; background:linear-gradient(to bottom, var(--path) 0%, var(--path-dark) 100%);
    border-radius:14px; box-shadow:inset 0 0 0 4px rgba(255,255,255,0.35), 0 6px 0 rgba(107,74,44,0.2);
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    padding:10px 0 14px; gap:4px; overflow:visible; position:relative;
  }
  .laneCard{
    width:88px; height:78px; border-radius:16px; background:var(--card-bg);
    display:flex; align-items:center; justify-content:center; text-align:center;
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:22px; color:var(--ink);
    box-shadow:0 4px 0 rgba(107,74,44,0.22), 0 2px 6px rgba(0,0,0,0.12);
    transition: transform 0.32s cubic-bezier(.34,1.2,.64,1), opacity 0.32s ease, filter .32s ease;
    margin-top:-9px;
    flex-shrink:0;
  }
  .laneCard:first-child{ margin-top:0; }
  .laneCard .katex{ font-size:1.12em; }

  /* depth stacking via distance-from-front (6 slots fixed) — kept legible further back */
  #lane .laneCard:nth-last-child(1){ transform:scale(1);    opacity:1;    filter:none; z-index:6; }
  #lane .laneCard:nth-last-child(2){ transform:scale(0.90); opacity:0.97; filter:none; z-index:5; }
  #lane .laneCard:nth-last-child(3){ transform:scale(0.81); opacity:0.9;  filter:none; z-index:4; }
  #lane .laneCard:nth-last-child(4){ transform:scale(0.73); opacity:0.8;  filter:none; z-index:3; }
  #lane .laneCard:nth-last-child(5){ transform:scale(0.66); opacity:0.68; filter:none; z-index:2; }
  #lane .laneCard:nth-last-child(6){ transform:scale(0.60); opacity:0.55; filter:none; z-index:1; }

  #nextTag{
    font-family:'Jua',sans-serif; font-size:13px; color:#fff;
    background:linear-gradient(180deg, var(--banner) 0%, var(--banner-dark) 100%);
    padding:5px 16px; border-radius:14px;
    box-shadow:0 3px 0 #C9701A, 0 2px 6px rgba(0,0,0,0.12);
    text-shadow:0 1px 0 rgba(0,0,0,0.15);
    letter-spacing:1px; pointer-events:none; margin-bottom:9px; z-index:7;
  }
  #nextTag .arrow{ display:inline-block; animation: nextArrowBounce 1.1s ease-in-out infinite; }
  @keyframes nextArrowBounce{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(3px); } }

  .laneCard.exitL{ transform:translate(-160px,10px) rotate(-25deg) scale(0.9) !important; opacity:0 !important; transition: transform 0.26s ease-in, opacity 0.26s ease-in; }
  .laneCard.exitR{ transform:translate(160px,10px) rotate(25deg) scale(0.9) !important; opacity:0 !important; transition: transform 0.26s ease-in, opacity 0.26s ease-in; }

  #floatScore{
    position:absolute; font-family:'Baloo 2',sans-serif; font-weight:700; font-size:19px;
    bottom:60%; left:50%; opacity:0; pointer-events:none; z-index:10;
  }
  #floatScore.pop{ animation: floatUp 0.7s ease forwards; }
  @keyframes floatUp{
    0%{ opacity:0; transform:translate(-50%,0) scale(0.8);}
    20%{ opacity:1; transform:translate(-50%,-10px) scale(1.15);}
    100%{ opacity:0; transform:translate(-50%,-56px) scale(1);}
  }

  /* ---------- CONTROLS ---------- */
  #controls{ display:flex; width:100%; max-width:420px; margin:0 auto; justify-content:center; align-items:stretch; padding:14px 22px calc(14px + env(safe-area-inset-bottom)); gap:24px; z-index:5; }
  .ctrlCol{ display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; }
  .ctrlLabel{ font-family:'Jua',sans-serif; font-size:14px; padding:4px 12px; border-radius:12px; }
  .ctrlLabel.irr{ background:var(--irr); color:var(--irr-ink); }
  .ctrlLabel.rat{ background:var(--rat); color:var(--rat-ink); }
  .arrowBtn{
    width:100%; max-width:130px; aspect-ratio:1.5/1; border:none; border-radius:22px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    font-size:34px; color:#fff; position:relative;
    transition: transform 0.08s ease;
  }
  .arrowBtn:active{ transform:scale(0.92) translateY(2px); }
  #btnIrr{ background:linear-gradient(180deg, var(--irr) 0%, var(--irr-dark) 100%); box-shadow:0 6px 0 #7A4FC4; }
  #btnRat{ background:linear-gradient(180deg, var(--rat) 0%, var(--rat-dark) 100%); box-shadow:0 6px 0 #2E9A7E; }
  .arrowBtn.flash{ filter:brightness(1.25); }
  .keyHint{ font-family:'Baloo 2',sans-serif; font-size:12px; color:var(--ink-soft); }

  /* ---------- OVERLAYS ---------- */
  .overlay{
    position:absolute; inset:0; z-index:40; background:rgba(255,255,255,0.55);
    backdrop-filter: blur(3px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:20px; gap:12px;
  }
  .ribbon{ position:relative; margin-bottom:6px; }
  .ribbonMain{
    background:linear-gradient(180deg, var(--banner) 0%, var(--banner-dark) 100%);
    padding:14px 34px; border-radius:20px; font-family:'Jua',sans-serif; font-size:30px; color:#fff;
    text-shadow:0 2px 0 rgba(0,0,0,0.15); box-shadow:0 6px 0 #C9701A; position:relative; z-index:2;
  }

  .ribbon::before, .ribbon::after{
    content:''; position:absolute; top:8px; width:34px; height:44px;
    background:var(--banner-dark); z-index:1; border-radius:6px;
  }
  .ribbon::before{ left:-14px; transform:skewY(18deg); }
  .ribbon::after{ right:-14px; transform:skewY(-18deg); }

  .overlay p{ margin:0; max-width:300px; font-size:15px; line-height:1.7; color:var(--ink); background:rgba(255,255,255,0.6); padding:10px 16px; border-radius:14px; }
  .rule-row{ display:flex; gap:10px; margin:2px 0; flex-wrap:wrap; justify-content:center; }
  .rule-chip{
    font-family:'Jua',sans-serif; font-size:12.5px; padding:8px 12px; border-radius:14px; color:var(--ink);
    background:#fff; box-shadow:0 3px 0 rgba(107,74,44,0.18);
  }
  .rule-chip b{ display:block; font-family:'Baloo 2',sans-serif; font-size:16px; color:var(--banner-dark); }
  .bigBtn{
    margin-top:6px; padding:14px 40px; border:none; border-radius:26px;
    background:linear-gradient(180deg, #FFD166, var(--banner-dark));
    color:#fff; font-family:'Jua',sans-serif; font-size:19px; letter-spacing:1px;
    cursor:pointer; box-shadow:0 6px 0 #C9701A;
  }
  .bigBtn:active{ transform:translateY(3px); box-shadow:0 3px 0 #C9701A; }

  #resultStats{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .stat{ background:#fff; border-radius:16px; padding:10px 14px; min-width:82px; box-shadow:0 4px 0 rgba(107,74,44,0.18); }
  .stat .n{ font-family:'Baloo 2',sans-serif; font-size:21px; font-weight:700; color:var(--banner-dark); }
  .stat .l{ font-size:11px; color:var(--ink-soft); margin-top:2px; font-family:'Jua',sans-serif; }

  .hidden{ display:none !important; }

  /* ---------- BACK BUTTON ---------- */
  #btnBack{
    position:absolute; top:10px; left:10px; z-index:70;
    width:36px; height:36px; border-radius:50%; border:none; cursor:pointer;
    background:rgba(255,255,255,0.85); color:var(--ink); font-size:17px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 0 rgba(107,74,44,0.25);
  }
  #btnBack:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(107,74,44,0.25); }
  @media (min-width:700px) and (min-height:640px){
    #btnBack{ top:44px; left:14px; }
  }

  /* ---------- RANKING ---------- */
  #btnRanking{
    margin-top:2px; padding:9px 22px; border:none; border-radius:20px; cursor:pointer;
    font-family:'Jua',sans-serif; font-size:13.5px; color:var(--ink);
    background:#fff; box-shadow:0 3px 0 rgba(107,74,44,0.18);
  }
  #btnRanking:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(107,74,44,0.18); }
  .rankBox{ width:100%; max-width:280px; background:rgba(255,255,255,0.7); border-radius:16px; padding:12px 14px; margin-top:4px; }
  .rankBox h4{ margin:0 0 8px; font-family:'Jua',sans-serif; font-size:14px; color:var(--banner-dark); }
  .rankList{ list-style:none; margin:0; padding:0; max-height:220px; overflow-y:auto; text-align:left; }
  .rankList li{ display:flex; align-items:center; gap:8px; padding:6px 4px; font-size:13.5px; border-bottom:1px solid rgba(107,74,44,0.08); }
  .rankList li.me{ background:rgba(255,196,104,0.35); border-radius:8px; }
  .rankList .rk{ width:20px; font-family:'Baloo 2',sans-serif; font-weight:700; color:var(--banner-dark); flex-shrink:0; }
  .rankList .rn{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rankList .rs{ font-family:'Baloo 2',sans-serif; font-weight:700; color:var(--rat-ink); flex-shrink:0; }
  .rankEmpty{ font-size:12.5px; color:var(--ink-soft); text-align:center; padding:10px 0; }
  .rankLoading{ font-size:12.5px; color:var(--ink-soft); text-align:center; padding:10px 0; }

  @media (max-width:380px){
    .laneCard{ width:74px; height:66px; font-size:18px; }
    .ribbonMain{ font-size:24px; padding:12px 24px; }
  }
</style>
</head>
<body>
<div id="bgDeco"></div>
<div id="app">
  <button id="btnBack" title="메인으로">◀</button>
  <div id="frameChrome"><span></span><span></span><span></span></div>
  <div id="frameTitle">이쪽저쪽 : 유리수 무리수</div>
  <div class="cloud" id="c1"></div>
  <div class="cloud" id="c2"></div>

  <div id="hud">
    <div class="pill score">⭐ <span class="n" id="scoreVal">0</span></div>
    <div class="pill timer" id="timerPill">⏰ <span class="n" id="timerVal">60</span></div>
    <div class="pill combo">🔥 <span class="n" id="comboVal">0</span></div>
  </div>

  <div id="feverBanner">피버타임! ×2 🎉</div>
  <div id="judgeFlash"></div>

  <div id="stage">
    <div id="laneWrap">
      <div id="tunnel"></div>
      <span id="nextTag">다음 카드 ▼</span>
      <div id="lane"></div>
      <div id="floatScore">+100</div>
      <div id="judgeMark" class="judgeMark"></div>
    </div>
  </div>

  <div id="controls">
    <div class="ctrlCol">
      <span class="ctrlLabel irr">무리수</span>
      <button class="arrowBtn" id="btnIrr">◀</button>
      <span class="keyHint">← 방향키</span>
    </div>
    <div class="ctrlCol">
      <span class="ctrlLabel rat">유리수</span>
      <button class="arrowBtn" id="btnRat">▶</button>
      <span class="keyHint">→ 방향키</span>
    </div>
  </div>

  <!-- START OVERLAY -->
  <div class="overlay" id="startOverlay">
    <div class="ribbon"><div class="ribbonMain">이쪽저쪽</div></div>
    <p>줄지어 오는 수 카드가 <b style="color:var(--irr-ink)">무리수</b>면 왼쪽(←), <b style="color:var(--rat-ink)">유리수</b>면 오른쪽(→)! 60초 동안 최대한 많이, 콤보를 이어서 피버타임을 노려보세요.</p>
    <div class="rule-row">
      <div class="rule-chip"><b>60초</b>전체시간</div>
      <div class="rule-chip"><b>콤보 유지</b>깜짝 피버타임</div>
      <div class="rule-chip"><b>×2~×3</b>피버 배율</div>
    </div>
    <button class="bigBtn" id="btnStart">시작하기</button>
    <button id="btnRanking">🏆 랭킹 보기</button>
    <div class="rankBox hidden" id="rankBoxStart">
      <h4>🏆 이쪽저쪽 랭킹 TOP 10</h4>
      <div id="rankListStart"><div class="rankLoading">불러오는 중...</div></div>
    </div>
  </div>

  <!-- END OVERLAY -->
  <div class="overlay hidden" id="endOverlay">
    <div class="ribbon"><div class="ribbonMain">타임업!</div></div>
    <div id="resultStats">
      <div class="stat"><div class="n" id="finalScore">0</div><div class="l">최종 점수</div></div>
      <div class="stat"><div class="n" id="finalCombo">0</div><div class="l">최고 콤보</div></div>
      <div class="stat"><div class="n" id="finalAcc">0%</div><div class="l">정확도</div></div>
      <div class="stat"><div class="n" id="finalFever">0</div><div class="l">피버 발동</div></div>
    </div>
    <button class="bigBtn" id="btnRestart">다시하기</button>
    <div id="bestNote" style="font-size:12.5px;color:var(--ink-soft);"></div>
    <div class="rankBox" id="rankBoxEnd">
      <h4>🏆 이쪽저쪽 랭킹 TOP 10</h4>
      <div id="rankListEnd"><div class="rankLoading">불러오는 중...</div></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  const GAME_TIME = 60;
  const GAME_ID = 'game1';
  const playerName = requirePlayerNameOrRedirect();
  if(!playerName) return; // 이름이 없으면 index.html 로 이동 중
  const FEVER_THRESHOLD = 10;      // combo streak needed to trigger fever
  const FEVER_DURATION = 10000;    // fever always lasts exactly 10s
  const FEVER_COOLDOWN_COMBO = 10; // extra correct-combo needed after a fever ends before the next can trigger
  const QUEUE_SIZE = 6;
  const WRONG_LOCK_MS = 450; // brief input lock after a wrong answer so mistakes don't chain

  const els = {
    app:document.getElementById('app'),
    score:document.getElementById('scoreVal'),
    timer:document.getElementById('timerVal'),
    timerPill:document.getElementById('timerPill'),
    combo:document.getElementById('comboVal'),
    banner:document.getElementById('feverBanner'),
    judgeFlash:document.getElementById('judgeFlash'),
    judgeMark:document.getElementById('judgeMark'),
    lane:document.getElementById('lane'),
    laneWrap:document.getElementById('laneWrap'),
    floatScore:document.getElementById('floatScore'),
    btnIrr:document.getElementById('btnIrr'),
    btnRat:document.getElementById('btnRat'),
    startOverlay:document.getElementById('startOverlay'),
    endOverlay:document.getElementById('endOverlay'),
    btnStart:document.getElementById('btnStart'),
    btnRestart:document.getElementById('btnRestart'),
    finalScore:document.getElementById('finalScore'),
    finalCombo:document.getElementById('finalCombo'),
    finalAcc:document.getElementById('finalAcc'),
    finalFever:document.getElementById('finalFever'),
    btnBack:document.getElementById('btnBack'),
    btnRanking:document.getElementById('btnRanking'),
    rankBoxStart:document.getElementById('rankBoxStart'),
    rankListStart:document.getElementById('rankListStart'),
    rankBoxEnd:document.getElementById('rankBoxEnd'),
    rankListEnd:document.getElementById('rankListEnd'),
    bestNote:document.getElementById('bestNote'),
  };

  let state = {};
  function resetState(){
    clearTimeout(state.lockTimeoutId);
    state = {
      running:false,
      score:0, combo:0, maxCombo:0,
      timeLeft:GAME_TIME,
      totalAttempts:0, correctAttempts:0,
      feverActive:false, feverCount:0,
      feverBaseline:0, // combo value the NEXT fever trigger is measured from
      feverTimeoutId:null, gameIntervalId:null,
      queue:[], lastKey:null,
      locked:false, lockTimeoutId:null, // brief input-lock after a wrong answer
    };
  }

  // ---------- audio ----------
  let actx;
  function ac(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
  function beep(freq,dur,type,gain){
    try{
      const ctx = ac(); const osc = ctx.createOscillator(); const g = ctx.createGain();
      osc.type = type||'sine'; osc.frequency.value = freq; g.gain.value = gain!==undefined?gain:0.08;
      osc.connect(g); g.connect(ctx.destination); osc.start();
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+dur);
      osc.stop(ctx.currentTime+dur);
    }catch(e){}
  }
  function sndCorrect(){ beep(760,0.09,'triangle',0.09); }
  function sndWrong(){ beep(150,0.16,'sawtooth',0.08); }
  function sndFever(){ beep(520,0.1,'square',0.06); setTimeout(()=>beep(780,0.14,'square',0.07),90); setTimeout(()=>beep(1040,0.2,'square',0.08),190); }

  // ---------- number pool ----------
  function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ [a,b]=[b,a%b]; } return a||1; }
  function makeRational(){
    const kinds=['int','frac','term','repeat','sqrtPerfect','cbrtPerfect'];
    const kind = kinds[Math.floor(Math.random()*kinds.length)];
    if(kind==='int'){ const n=Math.floor(Math.random()*41)-15; return {tex:String(n), isIrr:false}; }
    if(kind==='frac'){
      let num=Math.floor(Math.random()*17)-8; let den=Math.floor(Math.random()*8)+2;
      if(num===0) num=3;
      const g=gcd(num,den); num/=g; den/=g;
      if(Math.abs(num)===den) den+=1;
      const sign = num<0 ? '-' : '';
      return {tex:`${sign}\\frac{${Math.abs(num)}}{${den}}`, isIrr:false};
    }
    if(kind==='term'){
      const whole=Math.floor(Math.random()*12)-5;
      const d1=Math.floor(Math.random()*9)+1, d2=Math.floor(Math.random()*9);
      return {tex:`${whole}.${d1}${d2}`, isIrr:false};
    }
    if(kind==='repeat'){
      const whole=Math.floor(Math.random()*6)-2;
      const patterns=[{pre:'',rep:'3'},{pre:'',rep:'6'},{pre:'2',rep:'7'},{pre:'',rep:'45'},{pre:'1',rep:'8'},{pre:'',rep:'09'}];
      const p=patterns[Math.floor(Math.random()*patterns.length)];
      return {tex:`${whole}.${p.pre}\\overline{${p.rep}}`, isIrr:false};
    }
    if(kind==='sqrtPerfect'){
      const n=Math.floor(Math.random()*11)+2; const neg=Math.random()<0.3?'-':'';
      return {tex:`${neg}\\sqrt{${n*n}}`, isIrr:false};
    }
    if(kind==='cbrtPerfect'){
      const cubes=[8,27,64,125]; const c=cubes[Math.floor(Math.random()*cubes.length)];
      return {tex:`\\sqrt[3]{${c}}`, isIrr:false};
    }
  }
  function makeIrrational(){
    const kinds=['sqrtNonPerfect','pi','cbrtNonPerfect','piMulti'];
    const kind = kinds[Math.floor(Math.random()*kinds.length)];
    const perfect=[1,4,9,16,25,36,49,64,81,100,121,144];
    if(kind==='sqrtNonPerfect'){
      let n; do{ n=Math.floor(Math.random()*30)+2; }while(perfect.includes(n));
      const neg=Math.random()<0.25?'-':'';
      return {tex:`${neg}\\sqrt{${n}}`, isIrr:true};
    }
    if(kind==='pi'){ return {tex:'\\pi', isIrr:true}; }
    if(kind==='piMulti'){ const c=Math.floor(Math.random()*4)+2; return {tex:`${c}\\pi`, isIrr:true}; }
    if(kind==='cbrtNonPerfect'){
      const nonCubes=[2,3,4,5,6,7,9,10,11]; const n=nonCubes[Math.floor(Math.random()*nonCubes.length)];
      return {tex:`\\sqrt[3]{${n}}`, isIrr:true};
    }
  }
  function nextCardData(){
    let card, tries=0;
    do{
      const wantIrr = Math.random() < 0.5;
      card = wantIrr ? makeIrrational() : makeRational();
      tries++;
    }while(card.tex === state.lastKey && tries < 5);
    state.lastKey = card.tex;
    return card;
  }

  // ---------- lane rendering ----------
  function makeLaneCardEl(cardData){
    const d = document.createElement('div');
    d.className = 'laneCard';
    try{
      katex.render(cardData.tex, d, {throwOnError:false, displayMode:false});
    }catch(e){ d.textContent = cardData.tex; }
    d._data = cardData;
    return d;
  }
  function initLane(){
    els.lane.innerHTML = '';
    state.queue = [];
    for(let i=0;i<QUEUE_SIZE;i++){
      const data = nextCardData();
      state.queue.push(data);
      els.lane.appendChild(makeLaneCardEl(data));
    }
  }

  function updateHud(){
    els.score.textContent = state.score;
    els.combo.textContent = state.combo;
    // purely cosmetic combo hype — reveals nothing about fever timing
    els.combo.classList.toggle('hot', state.combo>=6 && state.combo<14);
    els.combo.classList.toggle('blaze', state.combo>=14);
  }

  function showFloatScore(text, positive){
    els.floatScore.textContent = text;
    els.floatScore.style.color = positive ? (state.feverActive ? '#F0932B' : 'var(--rat-ink)') : '#E5484D';
    els.floatScore.classList.remove('pop'); void els.floatScore.offsetWidth; els.floatScore.classList.add('pop');
  }
  function flashBtn(btn){ btn.classList.add('flash'); setTimeout(()=>btn.classList.remove('flash'),180); }

  function burstConfetti(){
    const colors = ['#FFD166','#FF8F6B','#C6A6FF','#8FEAD1','#FFF176'];
    for(let i=0;i<14;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      const ang = Math.random()*Math.PI*2;
      const dist = 60 + Math.random()*90;
      c.style.setProperty('--dx', Math.cos(ang)*dist+'px');
      c.style.setProperty('--dy', Math.sin(ang)*dist - 20 +'px');
      c.style.setProperty('--rot', (Math.random()*360)+'deg');
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      els.laneWrap.appendChild(c);
      requestAnimationFrame(()=> c.classList.add('go'));
      setTimeout(()=> c.remove(), 950);
    }
  }

  function spawnRing(color, scale, dur){
    const r = document.createElement('div');
    r.className = 'ring go';
    const size = 40;
    r.style.width = size+'px'; r.style.height = size+'px';
    r.style.borderWidth = '4px';
    r.style.borderColor = color;
    r.style.setProperty('--rscale', scale);
    r.style.setProperty('--rdur', dur+'ms');
    els.laneWrap.appendChild(r);
    setTimeout(()=> r.remove(), dur+50);
  }
  function spawnSparkles(colors, count, spread){
    for(let i=0;i<count;i++){
      const s = document.createElement('div');
      s.className = 'sparkle';
      const size = 5 + Math.random()*6;
      s.style.width = size+'px'; s.style.height = size+'px';
      s.style.background = colors[Math.floor(Math.random()*colors.length)];
      const ang = Math.random()*Math.PI*2;
      const dist = spread*0.5 + Math.random()*spread;
      s.style.setProperty('--dx', Math.cos(ang)*dist+'px');
      s.style.setProperty('--dy', Math.sin(ang)*dist - 10 +'px');
      const dur = 450 + Math.random()*250;
      s.style.setProperty('--sdur', dur+'ms');
      els.laneWrap.appendChild(s);
      requestAnimationFrame(()=> s.classList.add('go'));
      setTimeout(()=> s.remove(), dur+80);
    }
  }
  function popJudgeMark(text, good, scale){
    els.judgeMark.textContent = text;
    els.judgeMark.style.fontSize = (good ? 30+scale*4 : 30) + 'px';
    els.judgeMark.style.setProperty('--jscale', (1 + scale*0.12));
    els.judgeMark.classList.remove('correctGo','wrongGo');
    void els.judgeMark.offsetWidth;
    els.judgeMark.classList.add(good ? 'correctGo' : 'wrongGo');
  }
  function flashScreen(kind){
    els.judgeFlash.classList.remove('correct','wrong');
    void els.judgeFlash.offsetWidth;
    els.judgeFlash.classList.add(kind);
  }
  function shakeScreen(magnitude){
    els.app.style.setProperty('--shakeMag', magnitude);
    els.app.classList.remove('shake');
    void els.app.offsetWidth;
    els.app.classList.add('shake');
  }
  // combo tier 0..6, scales visual intensity of the correct-answer feedback
  function comboTier(combo){ return Math.max(0, Math.min(6, Math.floor(combo/4))); }

  function triggerCorrectEffect(combo){
    const tier = comboTier(combo);
    flashScreen('correct');
    spawnRing('rgba(69,201,166,0.85)', 2.0 + tier*0.35, 480 + tier*40);
    spawnSparkles(['#8FEAD1','#45C9A6','#FFD166','#C6A6FF'], 8 + tier*4, 60 + tier*14);
    popJudgeMark(tier>=3 ? '정답! 🔥' : '정답!', true, tier);
    const frontCard = els.lane.lastElementChild;
    if(frontCard){
      frontCard.classList.remove('pulseGood');
      void frontCard.offsetWidth;
      frontCard.classList.add('pulseGood');
    }
  }
  function triggerWrongEffect(lostCombo){
    flashScreen('wrong');
    const mag = 4 + Math.min(lostCombo, 16)*0.6;
    shakeScreen(mag.toFixed(2));
    popJudgeMark('땡!', false, 0);
    const frontCard = els.lane.lastElementChild;
    if(frontCard){
      frontCard.classList.remove('pulseBad');
      void frontCard.offsetWidth;
      frontCard.classList.add('pulseBad');
    }
  }

  function maybeTriggerFever(){
    if(state.feverActive) return;
    if(state.combo >= state.feverBaseline + FEVER_THRESHOLD){
      startFever();
    }
  }
  function startFever(){
    state.feverActive = true; state.feverCount++;
    els.app.classList.add('fever');
    els.banner.textContent = '피버타임! ×2 🎉';
    sndFever(); burstConfetti();
    els.banner.classList.remove('show'); void els.banner.offsetWidth; els.banner.classList.add('show');
    clearTimeout(state.feverTimeoutId);
    state.feverTimeoutId = setTimeout(()=>{
      state.feverActive = false;
      // next fever needs FEVER_COOLDOWN_COMBO more correct combo counted from here
      state.feverBaseline = state.combo + (FEVER_COOLDOWN_COMBO - FEVER_THRESHOLD);
      els.app.classList.remove('fever');
      updateHud();
    }, FEVER_DURATION);
  }
  function currentMultiplier(){
    if(!state.feverActive) return 1;
    return state.combo >= state.feverBaseline + FEVER_THRESHOLD + FEVER_THRESHOLD ? 3 : 2;
  }

  function advanceLane(exitDir){
    const frontEl = els.lane.lastElementChild;

    // Snapshot exactly where the front card sits on screen right now...
    const wrapRect = els.laneWrap.getBoundingClientRect();
    const cardRect = frontEl.getBoundingClientRect();

    // ...then instantly pull it out of the flex flow. This is what makes the
    // NEXT card become the real "front" immediately, so back-to-back inputs
    // are never blocked waiting for an animation to finish.
    els.lane.removeChild(frontEl);
    frontEl.style.position = 'absolute';
    frontEl.style.margin = '0';
    frontEl.style.left = (cardRect.left - wrapRect.left) + 'px';
    frontEl.style.top = (cardRect.top - wrapRect.top) + 'px';
    frontEl.style.width = cardRect.width + 'px';
    frontEl.style.height = cardRect.height + 'px';
    els.laneWrap.appendChild(frontEl);
    frontEl.classList.add(exitDir==='irr' ? 'exitL' : 'exitR');
    setTimeout(()=> frontEl.remove(), 260); // purely cosmetic cleanup, doesn't block anything

    // queue + new card go in right away — no waiting on the animation above
    state.queue.pop();
    const data = nextCardData();
    state.queue.unshift(data);
    const newEl = makeLaneCardEl(data);
    els.lane.insertBefore(newEl, els.lane.firstChild);
  }

  function handleAnswer(choice){
    if(!state.running) return;
    if(state.locked) return;
    if(!state.queue.length) return;

    const front = state.queue[state.queue.length-1];
    state.totalAttempts++;
    const correctChoice = front.isIrr ? 'irr' : 'rat';
    const isCorrect = choice === correctChoice;

    if(isCorrect){
      state.correctAttempts++;
      state.combo++;
      state.maxCombo = Math.max(state.maxCombo, state.combo);
      maybeTriggerFever();
      const mult = currentMultiplier();
      const gained = (100 + state.combo*10) * mult;
      state.score += gained;
      showFloatScore('+'+gained, true);
      sndCorrect();
      flashBtn(choice==='irr'?els.btnIrr:els.btnRat);
      triggerCorrectEffect(state.combo);
      updateHud();
      advanceLane(choice);
    } else {
      const lostCombo = state.combo;
      state.combo = 0;
      showFloatScore('앗!', false);
      sndWrong();
      flashBtn(choice==='irr'?els.btnIrr:els.btnRat);
      triggerWrongEffect(lostCombo);
      updateHud();

      // brief freeze: block further input and hold the missed card in place
      // for a beat before the lane moves on, so mistakes can't chain instantly
      state.locked = true;
      clearTimeout(state.lockTimeoutId);
      state.lockTimeoutId = setTimeout(()=>{
        state.locked = false;
        if(state.running) advanceLane(choice);
      }, WRONG_LOCK_MS);
    }
  }
  }

  // ---------- game loop ----------
  function tickTimer(){
    state.timeLeft--;
    els.timer.textContent = state.timeLeft;
    els.timerPill.classList.toggle('low', state.timeLeft<=10);
    if(state.timeLeft<=0) endGame();
  }
  function startGame(){
    resetState();
    state.running = true;
    els.startOverlay.classList.add('hidden');
    els.endOverlay.classList.add('hidden');
    els.app.classList.remove('fever');
    els.timerPill.classList.remove('low');
    els.timer.textContent = state.timeLeft;
    updateHud();
    initLane();
    state.gameIntervalId = setInterval(tickTimer, 1000);
  }
  function endGame(){
    state.running = false;
    clearInterval(state.gameIntervalId);
    clearTimeout(state.feverTimeoutId);
    clearTimeout(state.lockTimeoutId);
    els.app.classList.remove('fever');
    els.finalScore.textContent = state.score;
    els.finalCombo.textContent = state.maxCombo;
    const acc = state.totalAttempts ? Math.round(state.correctAttempts/state.totalAttempts*100) : 0;
    els.finalAcc.textContent = acc + '%';
    els.finalFever.textContent = state.feverCount;
    els.endOverlay.classList.remove('hidden');

    els.rankListEnd.innerHTML = '<div class="rankLoading">기록 저장 중...</div>';
    els.bestNote.textContent = '';
    saveScore(GAME_ID, playerName, state.score, { maxCombo: state.maxCombo, accuracy: acc }).then(res=>{
      if(res.ok){
        els.bestNote.textContent = res.updated
          ? '🎉 개인 최고 기록을 경신했어요!'
          : `이번 기록의 개인 최고 점수는 ${res.best}점이에요.`;
      }
    }).finally(()=>{
      loadRanking(els.rankListEnd, playerName, state.score);
    });
  }

  // ---------- ranking ----------
  async function loadRanking(listEl, myName, myScore){
    listEl.innerHTML = '<div class="rankLoading">불러오는 중...</div>';
    const rows = await fetchTopScores(GAME_ID, 10);
    renderRankingList(listEl, rows, { highlightName: myName, highlightScore: myScore });
  }

  els.btnBack.addEventListener('click', ()=>{
    if(state.running){
      if(!confirm('게임을 종료하고 메인 화면으로 돌아갈까요?')) return;
    }
    location.href = 'index.html';
  });

  els.btnRanking.addEventListener('click', ()=>{
    els.rankBoxStart.classList.toggle('hidden');
    if(!els.rankBoxStart.classList.contains('hidden')){
      loadRanking(els.rankListStart, null, null);
    }
  });

  // ---------- input ----------
  els.btnIrr.addEventListener('click', ()=> handleAnswer('irr'));
  els.btnRat.addEventListener('click', ()=> handleAnswer('rat'));
  document.addEventListener('keydown', (e)=>{
    if(!state.running) return;
    if(e.repeat) return; // ignore OS key auto-repeat while a key is held down
    if(e.key==='ArrowLeft'){ e.preventDefault(); handleAnswer('irr'); }
    else if(e.key==='ArrowRight'){ e.preventDefault(); handleAnswer('rat'); }
  });
  els.btnStart.addEventListener('click', startGame);
  els.btnRestart.addEventListener('click', startGame);

  resetState();
})();
</script>
</body>
</html>
